version: "3.9"
++,
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ../apps/api
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/saas
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      - db

  web:
    build: ../apps/web
    restart: always
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data: